<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hex-map-wfc-babylon</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%232e7d32' d='M32 4l24 14v28L32 60 8 46V18z'/%3E%3Cpath fill='%23b0bec5' d='M32 15l13 7.5v15L32 45l-13-7.5v-15z'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        color-scheme: light;
        font-family: "SF Mono", "IBM Plex Sans", sans-serif;
        background: radial-gradient(circle at top, #f5fbff 0%, #dfe8ef 58%, #c8d2d8 100%);
        color: #182028;
      }

      * {
        box-sizing: border-box;
      }

      html, body, #app {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        overflow: hidden;
      }

      #app {
        position: relative;
      }

      #viewport {
        width: 100%;
        height: 100%;
        display: block;
      }

      #hud {
        position: absolute;
        top: 20px;
        left: 20px;
        max-width: 360px;
        padding: 14px 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(24, 32, 40, 0.08);
        backdrop-filter: blur(12px);
        box-shadow: 0 18px 42px rgba(30, 39, 49, 0.12);
      }

      #title {
        margin: 0 0 6px;
        font-size: 14px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      #status, #zoom {
        margin: 0;
        font-size: 13px;
        line-height: 1.5;
      }

      #error {
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        padding: 24px;
        background: rgba(248, 241, 238, 0.94);
        color: #521b18;
      }

      #error.visible {
        display: grid;
      }

      #error-card {
        max-width: 520px;
        padding: 24px;
        border-radius: 18px;
        background: #fff8f7;
        border: 1px solid rgba(82, 27, 24, 0.12);
        box-shadow: 0 24px 60px rgba(82, 27, 24, 0.12);
      }

      #error-card h1 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      #error-card p {
        margin: 0;
        line-height: 1.6;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="viewport"></canvas>
      <aside id="hud">
        <h1 id="title">Hex Map WFC Babylon</h1>
        <p id="status">Preparing renderer…</p>
        <p id="zoom">Camera radius: --</p>
      </aside>
      <div id="error" aria-live="assertive">
        <div id="error-card">
          <h1>Renderer initialization failed</h1>
          <p id="error-message"></p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
